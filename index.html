<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Heitor 1 aninho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #video.traseira { transform: scaleX(1); }

    #overlay {
      position: fixed;
      inset: 0;
      width: 100vw; height: 100vh;
      object-fit: contain;
      pointer-events: none;
      z-index: 5;
    }
    #buttons {
      position: fixed;
      bottom: 50px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      z-index: 20;
    }
    button {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: none;
      background: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button:disabled { background: #aaa; cursor: not-allowed; }

    #recording-indicator, #loading-message {
      position: fixed;
      top: 15px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 6px 14px; border-radius: 20px; font-size: 14px;
      display: none; z-index: 30;
    }
    #preview-container, #video-preview-container {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 15px; z-index: 40;
    }
    img, video { max-width: 90%; max-height: 70vh; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <img id="overlay" src="moldura.png" alt="Moldura" />

  <div id="recording-indicator">🔴 REC 00:00</div>
  <div id="loading-message">Aguarde… preparando 📽️✨</div>

  <div id="buttons">
    <button id="switch-camera" title="Trocar câmera">🔄</button>
    <button id="capture" title="Tirar foto">📸</button>
    <button id="start-recording" title="Gravar vídeo">🎥</button>
    <button id="stop-recording" title="Parar gravação" style="display:none;">⏹</button>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>
  <canvas id="recordingCanvas" width="1080" height="1920" style="display:none;"></canvas>

  <div id="preview-container">
    <img id="photo-preview" />
    <button id="save-btn">💾 Salvar na galeria</button>
    <button id="retry-btn">🔄 Tirar outra</button>
  </div>

  <div id="video-preview-container">
    <video id="video-preview" controls playsinline></video>
    <button id="save-video-btn">💾 Salvar vídeo</button>
  </div>

<script>
const v = document.getElementById('video');
const overlay = document.getElementById('overlay');
const btnSwitch = document.getElementById('switch-camera');
const btnCapture = document.getElementById('capture');
const btnStartRec = document.getElementById('start-recording');
const btnStopRec = document.getElementById('stop-recording');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const recCanvas = document.getElementById('recordingCanvas');
const recCtx = recCanvas.getContext('2d');
const recInd = document.getElementById('recording-indicator');
const loadMsg = document.getElementById('loading-message');

let frente = true, stream = null, trocando = false;
let gravando = false, grav = null, blocos = [];

function mostrarCarregando(sim) { loadMsg.style.display = sim ? 'block' : 'none'; }

// ✅ CÂMERA FUNCIONA NOS DOIS MODOS
async function iniciarCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const modo = frente ? 'user' : 'environment';
  const tentativas = [
    {video:{facingMode:{exact:modo},width:{ideal:1080},height:{ideal:1920}}, audio:true},
    {video:{facingMode:modo}, audio:true},
    {video:true}
  ];
  for(let op of tentativas){
    try{
      mostrarCarregando(true);
      stream = await Promise.race([
        navigator.mediaDevices.getUserMedia(op),
        new Promise((_,r)=>setTimeout(()=>r('t'),7000))
      ]);
      break;
    }catch(e){ continue; }
  }
  mostrarCarregando(false);
  if(!stream){ alert('❌ Não foi possível acessar câmera'); return; }
  v.srcObject = stream;
  v.classList.toggle('traseira', !frente);
  trocando = false;
}

btnSwitch.onclick = async () => {
  if(trocando || gravando || !stream) return;
  trocando = true; btnSwitch.disabled = true;
  frente = !frente;
  await iniciarCam();
  btnSwitch.disabled = false;
};

// ✅ FOTO PRONTA E COMPATÍVEL
btnCapture.onclick = () => {
  if(!stream) return;
  const cfg = stream.getVideoTracks()[0].getSettings();
  canvas.width = cfg.width; canvas.height = cfg.height;
  ctx.clearRect(0,0,cfg.width,cfg.height);
  if(frente){ ctx.translate(cfg.width,0); ctx.scale(-1,1); }
  ctx.drawImage(v,0,0,cfg.width,cfg.height);
  ctx.setTransform(1,0,0,1,0,0);
  ctx.drawImage(overlay,0,0,cfg.width,cfg.height);

  document.getElementById('photo-preview').src = canvas.toDataURL('image/jpeg',0.92);
  document.getElementById('preview-container').style.display = 'flex';
};

document.getElementById('save-btn').onclick = () => {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg',0.92);
  a.download = 'heitor-foto.jpg'; a.click();
};
document.getElementById('retry-btn').onclick = () => {
  document.getElementById('preview-container').style.display = 'none';
};

// ✅ VÍDEO JUNTO, SEM CONFLITO
function desenharQuadro(){
  if(!gravando) return;
  recCtx.clearRect(0,0,1080,1920);
  if(frente){ recCtx.save(); recCtx.translate(1080,0); recCtx.scale(-1,1);
    recCtx.drawImage(v,0,0,1080,1920); recCtx.restore(); }
  else recCtx.drawImage(v,0,0,1080,1920);
  recCtx.drawImage(overlay,0,0,1080,1920);
  requestAnimationFrame(desenharQuadro);
}

btnStartRec.onclick = () => {
  if(!stream || gravando) return;
  gravando = true; blocos = [];
  const fluxo = recCanvas.captureStream(24);
  try {
    grav = new MediaRecorder(fluxo, {mimeType:'video/webm;codecs=vp8', videoBitsPerSecond:3500000});
  }catch{ grav = new MediaRecorder(fluxo); }
  grav.ondataavailable = e=>{if(e.data.size>0) blocos.push(e.data);};
  grav.onstop = ()=>{
    const arq = new Blob(blocos, {type:'video/webm'});
    const url = URL.createObjectURL(arq);
    document.getElementById('video-preview').src = url;
    document.getElementById('video-preview-container').style.display = 'flex';
  };
  grav.start();
  btnStartRec.style.display = 'none'; btnStopRec.style.display = 'inline';
  recInd.style.display = 'block';
  desenharQuadro();
};

btnStopRec.onclick = () => {
  if(!gravando) return; gravando = false;
  grav && grav.state==='recording' && grav.stop();
  btnStartRec.style.display = 'inline'; btnStopRec.style.display = 'none';
  recInd.style.display = 'none';
};

document.getElementById('save-video-btn').onclick = () => {
  const url = document.getElementById('video-preview').src;
  const a = document.createElement('a');
  a.href = url; a.download = 'heitor-video.webm'; a.click();
};

window.addEventListener('load', iniciarCam);
</script>
</body>
</html>
